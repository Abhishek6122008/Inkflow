services:
  postgres:
    image: postgres:16-alpine
    container_name: inkflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inkflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - inkflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: inkflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - inkflow_redis_data:/data

volumes:
  inkflow_postgres_data:
  inkflow_redis_data:
